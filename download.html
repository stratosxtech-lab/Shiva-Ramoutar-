  <script>
    // Smart redirect based on device
    (function() {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      var appleStore = "https://apps.apple.com/us/app/emergency-ready-disaster-prep/id6758622433";
      var googlePlay = "https://play.google.com/store/apps/details?id=space.manus.emergency.ready.t20250516195498";

      // iOS detection
      if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.href = appleStore;
        return;
      }

      // Android detection
      if (/android/i.test(userAgent)) {
        window.location.href = googlePlay;
        return;
      }

      // macOS detection - likely Apple user
      if (/Macintosh|MacIntel|MacPPC|Mac68K/.test(navigator.platform)) {
        window.location.href = appleStore;
        return;
      }

      // If not redirected, show the landing page (desktop/other)
    })();
  </script>
